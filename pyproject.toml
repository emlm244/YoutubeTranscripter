[tool.pytest.ini_options]
addopts = "-q --cov --cov-report=term-missing"
testpaths = ["tests"]

# Coverage intentionally focuses on modules with stable unit-test seams.
# GUI/transcription orchestration is type-checked by pyright and exercised by targeted integration-style tests.
[tool.coverage.run]
source = [
    "app_paths",
    "audio_preprocessor",
    "config",
    "exceptions",
    "launcher_preflight",
    "torch_runtime",
    "transcript_types",
]

[tool.coverage.report]
fail_under = 85
show_missing = true

[tool.ruff]
target-version = "py312"
line-length = 140
extend-exclude = [
    "build",
    "dist",
    "venv",
    "hf-cache",
    "tmp",
    ".hypothesis",
    ".mypy_cache",
    ".pytest_cache",
    ".ruff_cache",
    "__pycache__",
]

[tool.ruff.lint]
select = ["E", "F"]

[tool.pyright]
pythonVersion = "3.12"
venvPath = "."
venv = "venv"
typeCheckingMode = "basic"
include = [
    "app_paths.py",
    "audio_preprocessor.py",
    "config.py",
    "exceptions.py",
    "grammar_postprocessor.py",
    "gui_runtime_bootstrap.py",
    "gui_transcriber.py",
    "launcher_preflight.py",
    "runtime_bootstrap.py",
    "themes.py",
    "torch_runtime.py",
    "transcript_types.py",
    "youtube_transcriber.py",
    "widgets",
    "tests",
]
exclude = [
    "build",
    "dist",
    "venv",
    "hf-cache",
    "tmp",
    ".hypothesis",
    ".mypy_cache",
    ".pytest_cache",
    ".ruff_cache",
    "__pycache__",
]
